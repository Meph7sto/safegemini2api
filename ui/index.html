<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gemini Adapter Console</title>
    <link rel="stylesheet" href="/ui/styles.css" />
  </head>
  <body>
    <div id="app" class="page">
      <header class="hero">
        <h1>Gemini Adapter Console</h1>
        <p>Vue 前端 · OpenAI 兼容入口 · 会话增量模式调试面板</p>
        <div class="palette-row" aria-hidden="true">
          <span class="swatch c-blue"></span>
          <span class="swatch c-green"></span>
          <span class="swatch c-purple"></span>
          <span class="swatch c-pink"></span>
          <span class="swatch c-red"></span>
        </div>
      </header>

      <main class="layout">
        <section class="panel controls">
          <h2>连接参数</h2>
          <label>
            API Key
            <input v-model="apiKey" type="password" placeholder="可留空" />
          </label>
          <label>
            Model
            <input v-model="model" type="text" />
          </label>
          <label>
            Session Key
            <input v-model="sessionKey" type="text" placeholder="建议每个聊天唯一" />
          </label>
          <label class="inline">
            <input v-model="stream" type="checkbox" />
            流式输出
          </label>
          <button type="button" @click="clearMessages">清空对话</button>
          <p class="status" :style="{ borderLeftColor: statusError ? '#b80000' : '#f4b184' }">
            {{ status }}
          </p>
        </section>

        <section class="panel chat">
          <h2>对话</h2>
          <div ref="logRef" class="log" aria-live="polite">
            <article v-for="(item, index) in messages" :key="index" class="msg" :class="item.role">
              <div class="role">{{ item.role.toUpperCase() }}</div>
              <div>{{ item.content }}</div>
            </article>
          </div>
          <form class="composer" @submit.prevent="submitPrompt">
            <textarea
              v-model="prompt"
              rows="4"
              placeholder="输入消息，回车发送（Shift+Enter 换行）"
              @keydown="onPromptKeydown"
            ></textarea>
            <button type="submit" :disabled="sending">发送</button>
          </form>
        </section>
      </main>
    </div>

    <script src="/ui/vendor/vue.global.prod.js"></script>
    <script src="/ui/app.js" defer></script>
  </body>
</html>
